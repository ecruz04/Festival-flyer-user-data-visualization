<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thanks for Using My Program</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #191414, #1DB954);
      background-size: 400% 400%;
      animation: gradientFlow 12s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 3em;
      margin-bottom: 0.2em;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 2em;
    }

    .button {
      background-color: white;
      color: #191414;
      padding: 15px 35px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1em;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .button:hover {
      background-color: #1DB954;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <h1>🎉 Thanks for using my program!</h1>
  <p>We hope you enjoyed your personalized festival lineup.</p>
  <a class="button" href="/">Return to Home</a>
</body>
</html>
